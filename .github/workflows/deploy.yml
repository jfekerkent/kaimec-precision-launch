name: Build and Deploy to cPanel
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Stamp build info
        run: |
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          BUILD_SHA="${GITHUB_SHA::7}"
          echo "Stamping build: $BUILD_TIME $BUILD_SHA"
          cat > src/buildInfo.ts <<EOF
          // Auto-generated by deploy.yml. Do not edit.
          export const BUILD_TIME = "${BUILD_TIME}";
          export const BUILD_SHA = "${BUILD_SHA}";
          EOF
          sed -i "s|<meta name=\"build\" content=\"[^\"]*\" />|<meta name=\"build\" content=\"${BUILD_TIME} ${BUILD_SHA}\" />|" index.html

      - name: Build
        run: bun run build

      - name: Commit and push dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          git diff --staged --quiet || git commit -m "chore: update built dist [skip ci]"
          git push
